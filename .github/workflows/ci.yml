name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, format and test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        # Core + models + viz + dev are non-optional and install by default.
        # The neural (torch) and cloud groups are optional and skipped here:
        # neural tests use pytest.importorskip("torch") and skip cleanly, so CI
        # proves the metric packages lint and test without the heavy torch wheel.
        run: poetry install --no-interaction --no-root

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

      - name: Pre-commit hooks
        run: poetry run pre-commit run --all-files

      - name: Build package and import smoke
        # Proves the package builds and the metric subpackages import without the
        # optional torch dependency (the lazy-import contract).
        run: |
          poetry build
          poetry run python -c "import src.models.cxg, src.models.cxa, src.models.cxt; print('import-smoke ok (no torch)')"

      - name: Run tests with coverage
        # Conservative starting floor: analysis/ scripts are smoke-tested rather
        # than unit-tested, so they dilute the combined figure. Raise as coverage grows.
        run: poetry run pytest -q --cov=src --cov=analysis --cov-report=term-missing --cov-report=xml --cov-fail-under=25

      - name: Upload coverage artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
